name = "maddy"

image = "docker.io/foxcpp/maddy:0.5"

entrypoint = ["/bin/maddy", "-config", "/etc/maddy/maddy.conf"]

volumes = [
	"maddy_data:/data",
	"/etc/maddy/certs/mx1.yuri.space/fullchain.pem:/etc/maddy/certs/mx1.yuri.space/fullchain.pem",
	"/etc/maddy/certs/mx1.yuri.space/privkey.pem:/etc/maddy/certs/mx1.yuri.space/privkey.pem",
]

networks = [
	"public",
]

ports = [
	"25:25",
	"143:143",
	"993:993",
	"587:587",
	"465:465",
]

wants = ["mta-sts.service"]

[files]
"/etc/maddy/maddy.conf" = '''
$(hostname) = mx1.yuri.space
$(primary_domain) = yuri.space
$(local_domains) = $(primary_domain) yuriiozzelli.eu

tls.loader.acme acme_tls {
    email postmaster@yuri.space
    agreed
    challenge dns-01
    dns cloudflare {
        api_token "63W6d78YiRUuppXlT2ytUW6s4bkTgoSuRqX31tdF"
    }
}

# ----------------------------------------------------------------------------
# Local storage & authentication

auth.pass_table local_authdb {
    table sql_table {
        driver sqlite3
        dsn credentials.db
        table_name passwords
    }
}
storage.imapsql local_mailboxes {
    driver sqlite3
    dsn imapsql.db
}

# ----------------------------------------------------------------------------
# SMTP endpoints + message routing

hostname $(hostname)

msgpipeline local_routing {
    destination postmaster $(local_domains) {
        modify {
            replace_rcpt regexp "(.+)\+(.+)@(.+)" "$1@$3"
            replace_rcpt regexp "(.+)-(.+)@(.+)" "$1@$3"
            replace_rcpt table.static {
                entry postmaster@yuriiozzelli.eu postmaster@yuri.space
            }
        }

        deliver_to &local_mailboxes
    }

    default_destination {
        reject 550 5.1.1 "User doesn't exist"
    }
}

smtp tcp://0.0.0.0:25 {
    tls &acme_tls

    limits {
        # Up to 20 msgs/sec across max. 10 SMTP connections.
        all rate 20 1s
        all concurrency 10
    }

    dmarc yes
    check {
        require_mx_record
        dkim
        spf
    }

    source $(local_domains) {
        reject 501 5.1.8 "Use Submission for outgoing SMTP"
    }
    default_source {
        destination postmaster $(local_domains) {
            deliver_to &local_routing
        }
        default_destination {
            reject 550 5.1.1 "User doesn't exist"
        }
    }
}

submission tls://0.0.0.0:465 tcp://0.0.0.0:587 {
    tls &acme_tls

    limits {
        # Up to 50 msgs/sec across any amount of SMTP connections.
        all rate 50 1s
    }

    auth &local_authdb

    source $(local_domains) {
        destination postmaster $(local_domains) {
            deliver_to &local_routing
        }
        default_destination {
            modify {
                dkim $(primary_domain) $(local_domains) default
            }
            deliver_to &remote_queue
        }
    }
    default_source {
        reject 501 5.1.8 "Non-local sender domain"
    }
}

target.remote outbound_delivery {
    limits {
        # Up to 20 msgs/sec across max. 10 SMTP connections
        # for each recipient domain.
        destination rate 20 1s
        destination concurrency 10
    }
    mx_auth {
        dane
        mtasts {
            cache fs
            fs_dir mtasts_cache/
        }
        local_policy {
            min_tls_level encrypted
            min_mx_level none
        }
    }
}

target.queue remote_queue {
    target &outbound_delivery

    autogenerated_msg_domain $(primary_domain)
    bounce {
        destination postmaster $(local_domains) {
            deliver_to &local_routing
        }
        default_destination {
            reject 550 5.0.0 "Refusing to send DSNs to non-local addresses"
        }
    }
}

# ----------------------------------------------------------------------------
# IMAP endpoints

imap tls://0.0.0.0:993 tcp://0.0.0.0:143 {
    tls &acme_tls

    auth &local_authdb
    storage &local_mailboxes
}
'''

